name: Build and Push App Image

# The fast build: application xars layered onto the published betmas-data
# base (see build-data.yml). Runs on every master push instead of the old
# ~3h monolith rebuild.

on:
  workflow_run:
    workflows: ["Format Check"]
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: betamasaheft/betamasaheft

jobs:
  build:
    name: Build and Push App Image
    runs-on: ubuntu-latest
    # Only build and push images from master: after a successful format check
    # on master, or when manually dispatched on master
    if: >-
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'master') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/master')
    permissions:
      contents: read
      packages: write

    steps:
      # The base is ~11GB before this job adds its own layers; the default
      # runner disk is too tight once both arches are pulled/built.
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          build-mount-path: /var/lib/docker/
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"
          remove-docker-images: "true"
          root-reserve-mb: 4096
          temp-reserve-mb: 1024

      - name: Restart docker
        run: sudo service docker restart

      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: betmas-bot
          password: ${{ secrets.BOT_CONTAINER_PAT }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/app.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:release-expanded
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            BETMAS_DATA_IMAGE=${{ env.REGISTRY }}/betamasaheft/betmas-data:latest
            APP_COMMIT=${{ github.event.workflow_run.head_sha || github.sha }}
          cache-from: type=gha,scope=app
          # ignore-error: a failed cache export must not fail an otherwise successful build
          cache-to: type=gha,mode=max,scope=app,ignore-error=true
